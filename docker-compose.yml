services:
  my-claude-bot:
    build: .
    container_name: my-claude-bot
    restart: always
    env_file: .env
    user: "${UID:-1000}:${GID:-1000}"
    volumes:
      # Все агенты: память, SOUL, скиллы, шаблоны
      - ./agents:/app/agents
      # Claude CLI — бинарники (entrypoint.sh сам найдёт нужную версию)
      - ${HOST_HOME}/.local/share/claude:/home/botuser/.local/share/claude:ro
      # Claude CLI config (авторизация)
      - ${HOST_HOME}/.claude:/home/botuser/.claude
      - ${HOST_HOME}/.claude.json:/home/botuser/.claude.json
    deploy:
      resources:
        limits:
          memory: 1G      # Увеличено для multi-agent + Dream/Heartbeat
          cpus: "2.0"     # Максимум 2 ядра
        reservations:
          memory: 256M    # Гарантированный минимум
    logging:
      driver: json-file
      options:
        max-size: "50m"   # Логи не разрастутся больше 50MB
        max-file: "3"     # Максимум 3 файла логов (итого 150MB)
    healthcheck:
      test: ["CMD", "python3", "-c", "import sys; sys.exit(0)"]
      interval: 60s
      timeout: 10s
      retries: 3
