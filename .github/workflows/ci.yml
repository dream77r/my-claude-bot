name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff

      - name: Lint with ruff (new modules)
        run: |
          ruff check src/input_sanitizer.py src/ssrf_protection.py src/metrics.py src/checkpoint.py src/audit.py src/mcp_skill_marketplace.py --select E,F,W --ignore E501

      - name: Run tests
        run: |
          python -m pytest tests/ -v --tb=short
