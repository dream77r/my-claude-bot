# SkillAdvisor Digest — ежедневная сводка предложений по скиллам
# Master получает предложения от worker-агентов и раз в день
# отправляет дайджест владельцу
skill_advisor_digest:
  hour: 20                     # час отправки дайджеста (20:00)

# Dream Memory — фоновая обработка памяти по расписанию
dream:
  interval_hours: 2          # каждые 2 часа
  model_phase1: "haiku"      # дешёвый вызов: извлечение фактов
  model_phase2: "sonnet"     # агентный вызов: обновление wiki

# Knowledge Graph — ночной 3-уровневый граф связей памяти
# Уровень 1: Линковка [[Obsidian]] связей в дневном логе
# Уровень 2: Саммари дня с [[ссылками]] на wiki
# Уровень 3: Синтез графа — перелинковка всех саммари
knowledge_graph:
  enabled: true
  run_hour: 1                  # час запуска UTC (= 04:00 MSK)
  run_minute: 0
  model: "haiku"               # дешёвая модель для всех уровней
  max_summaries: 30            # сколько саммари подавать в Уровень 3
  synthesis_schedule:
    daily_phase_days: 14       # первые 14 дней — Уровень 3 каждый день
    regular_interval_days: 3   # потом — каждые 3 дня

# Heartbeat — проактивные задачи (Smart Heartbeat с триггерами)
heartbeat:
  enabled: true
  interval_minutes: 30
  triggers:
    - name: "morning_briefing"
      schedule: "0 9 * * *"
      prompt: |
        Доброе утро! Подготовь утренний брифинг:
        1. Прочитай wiki/concepts/ — есть ли задачи на сегодня?
        2. Прочитай вчерашний daily — что обсуждали, что осталось?
        3. Проверь дедлайны в wiki — есть ли что-то срочное?
        Формат: краткий список на 3-5 пунктов. Только важное.
      model: "sonnet"
      notify: true
    - name: "evening_digest"
      schedule: "0 21 * * *"
      prompt: |
        Вечерний дайджест:
        1. Прочитай сегодняшний daily — что обсуждали?
        2. Что нового в wiki за сегодня?
        3. Подведи итог: что сделано, что перенести на завтра.
        Формат: 3-5 пунктов, кратко.
      model: "haiku"
      notify: true
    - name: "deadline_check"
      schedule: "0 */4 * * *"
      prompt: |
        Проверь wiki на задачи с приближающимися дедлайнами (ближайшие 48 часов).
        Если есть — составь напоминание. Если нет — не уведомляй.
      model: "haiku"
      notify: "auto"
