# SkillAdvisor Digest — ежедневная сводка предложений по скиллам
# Master получает предложения от worker-агентов и раз в день
# отправляет дайджест владельцу
skill_advisor_digest:
  hour: 20                     # час отправки дайджеста (20:00)

# Dream Memory — фоновая обработка памяти по расписанию
dream:
  interval_hours: 2          # каждые 2 часа
  model_phase1: "haiku"      # дешёвый вызов: извлечение фактов
  model_phase2: "sonnet"     # агентный вызов: обновление wiki

# Knowledge Graph — ночной 3-уровневый граф связей памяти
# Уровень 1: Линковка [[Obsidian]] связей в дневном логе
# Уровень 2: Саммари дня с [[ссылками]] на wiki
# Уровень 3: Синтез графа — перелинковка всех саммари
knowledge_graph:
  enabled: true
  run_hour: 1                  # час запуска UTC (= 04:00 MSK)
  run_minute: 0
  model: "haiku"               # дешёвая модель для всех уровней
  max_summaries: 30            # сколько саммари подавать в Уровень 3
  synthesis_schedule:
    daily_phase_days: 14       # первые 14 дней — Уровень 3 каждый день
    regular_interval_days: 3   # потом — каждые 3 дня

# Heartbeat — проактивные задачи (Smart Heartbeat с триггерами)
heartbeat:
  enabled: true
  interval_minutes: 30
  triggers:
    - name: "morning_briefing"
      schedule: "0 9 * * *"
      prompt: |
        Доброе утро! Подготовь утренний брифинг.

        Рабочая директория = memory/ текущего агента. Всё локально, путей в интернет нет.
        Нужные файлы (относительно cwd):
        1. `./wiki/concepts/roadmap.md` — стратегический roadmap и дедлайны этапов
        2. `./wiki/` — остальные концепты и сущности (Glob `./wiki/**/*.md`)
        3. `./daily/` — дневные логи. Вчерашний = `./daily/<YYYY-MM-DD>.md` за вчера.

        Что сделать:
        - Прочитай roadmap.md: какие этапы активны, сколько дней до их дедлайнов от СЕГОДНЯ.
        - Прочитай вчерашний daily: что обсуждали, какие открытые вопросы.
        - Сведи в 3-5 пунктов: только важное и действенное.
      model: "sonnet"
      notify: true
    - name: "evening_digest"
      schedule: "0 21 * * *"
      prompt: |
        Вечерний дайджест.

        Рабочая директория = memory/ текущего агента (всё локально).
        Файлы:
        - `./daily/<сегодня>.md` — сегодняшний лог разговоров и триггеров
        - `./wiki/` — концепты и сущности, обновлённые за сегодня (git log или mtime)

        Сделай:
        1. Прочитай сегодняшний daily — о чём говорили, какие решения.
        2. Посмотри изменения wiki за сегодня (`Glob ./wiki/**/*.md`, смотри свежие).
        3. Итог в 3-5 пунктов: сделано / перенесено на завтра.
      model: "haiku"
      notify: true
    - name: "deadline_check"
      schedule: "0 */4 * * *"
      prompt: |
        Проверка дедлайнов по локальной wiki агента.

        Рабочая директория = memory/ текущего агента. Wiki — это директория `./wiki/`,
        НЕ внешний сервис. Никаких URL, логинов, API — всё читается через Read/Glob/Grep.

        Алгоритм:
        1. `Glob ./wiki/**/*.md` — получить все страницы.
        2. Прочитай `./wiki/concepts/roadmap.md` (основной источник дедлайнов этапов).
        3. Grep по всем wiki-файлам на даты формата `YYYY-MM-DD` и на слова «дедлайн/срок/deadline».
        4. Для каждой найденной даты: сравни с СЕГОДНЯ. Если дедлайн в ближайшие 48 часов —
           составь короткое напоминание (что, когда, сколько осталось).
        5. Если ничего не нашёл или все даты дальше 48 часов — верни ровно строку `NO_DEADLINES`
           и больше ничего не пиши. Не задавай вопросов пользователю.
      model: "haiku"
      notify: "auto"
