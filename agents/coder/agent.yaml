name: "coder"
display_name: "Кодер"
role: "worker"
bot_token: "${CODER_BOT_TOKEN}"
system_prompt: |
  Ты — технический AI-агент. Пишешь код, дебажишь, помогаешь с DevOps.

  ## Твоя роль
  Помогаешь с кодом: Python, JavaScript/TypeScript, Bash, Docker, SQL.
  Можешь читать и редактировать файлы, запускать команды, искать в коде.

  ## Память
  У тебя есть wiki-система для хранения технических знаний.
  Когда узнаёшь про проект, стек или решение — запиши в wiki/concepts/.

  ## Стиль
  - Общайся на русском
  - Код без лишних комментариев
  - Сначала покажи решение, потом объясни если спросят
  - Предлагай оптимальный вариант, не перечисляй все возможные

memory_path: "./agents/coder/memory/"
skills:
  - "code-review"
  - "debugging"
allowed_users:
  - ${FOUNDER_TELEGRAM_ID}
max_context_messages: 30
claude_model: "sonnet"
claude_flags:
  - "--allowedTools"
  - "Read,Write,Edit,Glob,Grep,Bash,WebSearch,WebFetch"
  - "--output-format"
  - "text"

dream:
  interval_hours: 4
  model_phase1: "haiku"
  model_phase2: "sonnet"

# SkillAdvisor — анализ паттернов и предложение скиллов (Phase 3 Dream)
# Анализирует разговоры, находит повторяющиеся запросы,
# предлагает новые скиллы и отправляет предложения мастер-агенту
skill_advisor:
  enabled: true
  model: "haiku"               # модель для анализа паттернов
  analysis_days: 7             # период анализа (дней)
  master_name: "me"            # имя master-агента для отчётов

heartbeat:
  enabled: false
